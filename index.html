<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karnaval Studio — Прокат костюмів</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="logo-wrap">
    <!-- ЗАМІНІТЬ logo-placeholder.svg на ваш файл логотипу (наприклад logo.png) -->
    <img src="Логок.png" alt="Karnaval Studio">
  </div>

  <form class="search-form" onsubmit="return false;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input id="search-input" type="text" placeholder="Пошук костюма..." autocomplete="off">
  </form>

  <div class="header-icons">
    <a id="icon-maps" class="icon-btn" target="_blank" rel="noopener" aria-label="Карти">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
        <circle cx="12" cy="10" r="3"></circle>
      </svg>
    </a>
    <a id="icon-instagram" class="icon-btn" target="_blank" rel="noopener" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="2" width="20" height="20" rx="5"></rect>
        <circle cx="12" cy="12" r="4"></circle>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle>
      </svg>
    </a>
    <a id="icon-telegram" class="icon-btn" target="_blank" rel="noopener" aria-label="Telegram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2 11 13"></path>
        <path d="M22 2 15 22l-4-9-9-4 20-7z"></path>
      </svg>
    </a>
    <a id="icon-viber" class="icon-btn" target="_blank" rel="noopener" aria-label="Viber">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2h-4l-5 4v-4H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"></path>
      </svg>
    </a>
    <a id="icon-phone" href="#" class="icon-btn" aria-label="Телефон">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .3 2 .7 3a2 2 0 0 1-.5 2.1L8 10.1a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c1 .4 2 .6 3 .7a2 2 0 0 1 1.7 2z"></path>
      </svg>
    </a>
  </div>
</header>

<nav class="category-nav" id="category-nav"></nav>

<main class="catalog-grid" id="catalog-grid">
  <div class="loading-state">Завантаження каталогу…</div>
</main>
<div id="scroll-sentinel"></div>

<!-- Плаваюча кнопка "Відкладені" -->
<button class="stash-fab" id="stash-fab" style="display:none;">
  ♥ Відкладені (<span id="stash-count">0</span>)
</button>

<!-- Картка товару -->
<div class="overlay" id="product-overlay">
  <div class="product-sheet" id="product-sheet"></div>
</div>

<!-- Панель "Відкладені" -->
<div class="stash-panel" id="stash-panel">
  <div class="stash-sheet">
    <button class="close-btn" id="stash-close" style="position:absolute; top:14px; right:14px; background:var(--card-bg); color:var(--text);">&times;</button>
    <h2>Відкладені костюми</h2>
    <p class="stash-hint">Це просто список для порівняння — покупки на сайті немає. Зробіть скриншот і надішліть нам зручним способом.</p>
    <div id="stash-list"></div>
  </div>
</div>

<!-- Модалка телефону -->
<div class="phone-modal" id="phone-modal">
  <div class="phone-card">
    <div>Зателефонуйте нам</div>
    <div class="number" id="phone-number-text"></div>
    <a class="call-btn" id="phone-call-link">Зателефонувати</a>
    <button class="close-text" id="phone-close" style="background:none;border:none;">Закрити</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
